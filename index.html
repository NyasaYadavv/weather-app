<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0">

    <title> My Weather Application </title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div class="container">

      <h1> Weather Application </h1>

    <form class="search-form">


        <input
              class="city-input"
              type="text"
            placeholder="Enter city name">

        <button class="search-btn">
            search
        </button>

        </form>
      
      <div class="weather-card"> 

        <h2 id="city-name">City Name</h2>

        <p id="message">🔍 Search for a city to view its weather.</p>

    <h2> Current Weather</h2>

    <p id="temperature">Temperature : -- °C</p>

    <p id="feels-like">Feels Like : -- °C</p>

    <p id="visibility">Visibility : -- m</p>

<p id="humidity">Humidity : --%</p>

<p id="wind">Wind Speed : -- km/h</p>

<p id="pressure">Pressure : -- hPa</p>

<p id="sunrise">Sunrise : --</p>

<img id="weather-icon" src="" alt="Weather Icon" width="100">

<p id="description">Weather : --</p>

<p id="last-updated">Last Updated : --</p>

<h3>Recent Searches</h3>

<button id="clear-history">Clear History</button>

<ul id="history"></ul>

  </div>

  </div>

  <script src="script.js"></script>


    </body>
</html>
